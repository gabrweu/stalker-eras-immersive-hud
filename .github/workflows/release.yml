name: Create Release with Zip Archive

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: ''
      description:
        description: 'Release description'
        required: false
        default: ''

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build structure
        run: |
          mkdir -p build_temp
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitattributes' \
            --exclude 'README.md' \
            --exclude 'meta.ini' \
            ./* build_temp/
          echo "Files to build:"
          ls -la build_temp/

      - name: Create zip archive
        run: |
          cd build_temp
          zip -r -9 ../ERA-Immersive-HUD-${{ github.event.inputs.version }}.zip gamedata

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: |
            ${{ github.event.inputs.description }}
          files: ERA-Immersive-HUD-${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
